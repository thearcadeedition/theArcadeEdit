<script src="assets/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // 1. Initialize background animation safely
    if (typeof initNetwork === 'function') initNetwork();

    const previewFavicon = document.getElementById('preview-favicon');
    const previewTitle   = document.getElementById('preview-title');
    const customTitle    = document.getElementById('custom-title');

    function updatePreview(iconUrl, name) {
        if (previewFavicon) previewFavicon.src = iconUrl || 'favicon.png';
        if (previewTitle) previewTitle.textContent = name.slice(0, 24) + (name.length > 24 ? '…' : '');
    }

    // 2. Safe execution guard: Wait for disguise system functions to be available
    function loadSavedDisguise() {
        if (typeof getDisguise !== 'function') return;
        
        const saved = getDisguise();
        if (saved) {
            updatePreview(saved.icon, saved.name);
            if (customTitle) customTitle.value = saved.name;
            
            document.querySelectorAll('.preset-btn').forEach(b => {
                if (b.dataset.name === saved.name) b.classList.add('active');
            });
        }
    }

    // Load initial state
    loadSavedDisguise();

    // 3. Live preview handling as the user types custom text
    if (customTitle) {
        customTitle.addEventListener('input', () => {
            const currentSaved = typeof getDisguise === 'function' ? getDisguise() : null;
            const activeIcon = currentSaved ? currentSaved.icon : 'favicon.png';
            updatePreview(activeIcon, customTitle.value || 'My Game Vault');
        });
    }

    // 4. Preset selection grid click handler
    const presetGrid = document.getElementById('preset-grid');
    if (presetGrid) {
        presetGrid.addEventListener('click', e => {
            const btn = e.target.closest('.preset-btn');
            if (!btn) return;
            
            const icon = btn.dataset.icon;
            const name = btn.dataset.name;
            
            if (customTitle) customTitle.value = name;
            updatePreview(icon, name);
            
            if (typeof applyDisguise === 'function') {
                applyDisguise(icon, name);
            }
            
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    }

    // 5. Apply custom input button configuration
    const applyBtn = document.getElementById('apply-btn');
    if (applyBtn && customTitle) {
        applyBtn.addEventListener('click', () => {
            const name = customTitle.value.trim() || 'My Game Vault';
            const currentSaved = typeof getDisguise === 'function' ? getDisguise() : null;
            const icon = currentSaved ? currentSaved.icon : 'favicon.png';
            
            if (typeof applyDisguise === 'function') {
                applyDisguise(icon, name);
            }
            updatePreview(icon, name);
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        });
    }

    // 6. Reset action execution
    const resetBtn = document.getElementById('reset-btn');
    if (resetBtn) {
        resetBtn.addEventListener('click', () => {
            if (typeof clearDisguise === 'function') {
                clearDisguise();
            }
            if (customTitle) customTitle.value = '';
            updatePreview('favicon.png', 'My Game Vault');
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        });
    }
});
</script>
